<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../assets/js/checkUrl.js"></script>
    <title>
        Live Mock Test Analysis
    </title>
    <style>
        #preLoader {
       
       position: fixed;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       background-color: #fff;
       z-index: 9999;
       display: flex;
       justify-content: center;
       align-items: center;
     }

     

.card {
    transition: all .3s ease;
}

.card:hover {
    transform: translateY(-5px);
}

.pagination .page-link {
    background: #212529;
    color: #ffc107;
    border-color: #495057;
}

.pagination .active .page-link {
    background: #ffc107;
    color: #000;
    border-color: #ffc107;
}

#searchInput {
    border: 2px solid #ffc107;
}

</style>
  
   
   <script>
       window.onload = function () {
         document.getElementById('preLoader').style.transition = "all 2s ease-in-out";
         document.getElementById('preLoader').style.opacity = "0";
         document.getElementById('preLoader').style.visibility = "hidden";
       }
     </script>
</head>
<body class="text-light">

<div class="container py-4">

    <div class="row mb-4">
        <div class="col-md-6 mx-auto">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Search Exam...">
        </div>
    </div>

    <div id="cardContainer" class="row g-3"></div>

    <nav class="mt-4">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>

</div>

<script>
const itemsPerPage = 10;

let currentPage = 1;
let allData = [];
let filteredData = [];

async function getData() {
    const response = await fetch("../QuestionPapers/qp-generator/data.json");
    return await response.json();
}

function renderCards() {

    const container = document.getElementById("cardContainer");

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;

    const pageData = filteredData.slice(start, end);

    let html = "";

    pageData.forEach((item, index) => {

        html += `
            <div class="col-md-6 col-lg-4">
                <div class="card bg-secondary-subtle border-warning h-100 shadow-sm">
                    <div class="card-body">

                        <span class="badge bg-warning text-dark mb-2">
                            #${start + index + 1}
                        </span>

                        <h5 class="card-title text-dark">
                            ${item.exam_name}
                        </h5>

                        <a href="mock-test-analysis.html?OrgID=MHBC&PoweredBy=nandysagar.in&ExamID=${item.exam_id}"
                           class="btn btn-warning btn-sm mt-2">
                            View Analysis
                        </a>

                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;

    renderPagination();
}

function renderPagination() {

    const totalPages = Math.ceil(filteredData.length / itemsPerPage);

    let html = "";

    html += `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">
                Previous
            </a>
        </li>
    `;

    for(let i = 1; i <= totalPages; i++) {

        html += `
            <li class="page-item ${currentPage === i ? 'active' : ''}">
                <a class="page-link" href="#" onclick="changePage(${i})">
                    ${i}
                </a>
            </li>
        `;
    }

    html += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">
                Next
            </a>
        </li>
    `;

    document.getElementById("pagination").innerHTML = html;
}

function changePage(page) {

    const totalPages = Math.ceil(filteredData.length / itemsPerPage);

    if(page < 1 || page > totalPages) return;

    currentPage = page;

    renderCards();

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

document.addEventListener("input", function(e){

    if(e.target.id === "searchInput") {

        const keyword = e.target.value.toLowerCase();

        filteredData = allData.filter(item =>
            item.exam_name.toLowerCase().includes(keyword)
        );

        currentPage = 1;

        renderCards();
    }
});

getData().then(data => {

    allData = data.reverse();

    filteredData = [...allData];

    renderCards();
});
</script>

</body>
</html>
