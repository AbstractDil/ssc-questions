<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title will be auto-generated --> 
    <title>Mock Test Analysis</title>

    <style>
        body {
            background-color: #0f1117;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }

        #content {
            width: 100%;
            height: 100vh;
        }
    </style>
  
</head>
<body>

    <!-- show an alert msg in html to go actual url -->
        <div id="alert" style="background-color: #fbbf24; color: #0f1117; padding: 15px; text-align: center;">
            <strong>Note:</strong> You are viewing a mock analysis page. If you are facing any issues, please visit the actual analysis page by clicking <a href="#" id="actualLink" style="color: #0f1117; font-weight: bold;">here</a>.
        </div>

    <!-- show content using iframe -->
     <div id="content"></div>




 <script src="../assets/js/checkUrl.js" type="text/javascript"></script>
<script>
    // GET EXAM ID FROM URL
    const urlParams = new URLSearchParams(window.location.search);
    const examId = urlParams.get('ExamID');
    console.log("Exam ID:", examId);
    // Load the content of the exam analysis page based on the exam ID
    if (examId) {
        document.getElementById('content').innerHTML = `<iframe src="../QuestionPapers/qp-generator/index.html?ExamID=${examId}" style="width: 100%; height: 100vh; border: none;"></iframe>`;

        // Update the actual link in the alert message
        document.getElementById('actualLink').href = `../QuestionPapers/qp-generator/index.html?ExamID=${examId}`;

    } else {
        document.getElementById('content').innerHTML = `<p style="color: red; text-align: center; margin-top: 20px;">Error: Exam ID not provided in the URL.</p>`;
    }
</script>
    
</body>
</html>
