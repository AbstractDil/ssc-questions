<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSC Mock Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* ── CSS Variables ── */
      :root {
        --bg:        #0f1117;
        --surface:   #1a1d27;
        --border:    #2a2d3a;
        --text:      #e8eaf0;
        --muted:     #7a7f94;
        --accent:    #f5c518;
        --accent-dim:#3a3010;
        --shadow:    0 4px 24px rgba(0,0,0,0.4);
        --radius:    14px;
        --transition: 0.25s ease;
      }

      [data-theme="light"] {
        --bg:        #f4f5f8;
        --surface:   #ffffff;
        --border:    #e0e2ea;
        --text:      #111218;
        --muted:     #6b7080;
        --accent:    #d4a017;
        --accent-dim:#fff8e1;
        --shadow:    0 4px 24px rgba(0,0,0,0.08);
      }

      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition: background var(--transition), color var(--transition);
      }

      /* ── Layout ── */
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 3rem 1.5rem 5rem;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 3.5rem;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      .brand-label {
        font-family: 'Syne', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* ── Theme Toggle ── */
      .theme-toggle {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 50px;
        padding: 6px 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 0.8rem;
        font-family: 'DM Sans', sans-serif;
        color: var(--muted);
        font-weight: 500;
        transition: border-color var(--transition), color var(--transition), background var(--transition);
      }
      .theme-toggle:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .theme-toggle .icon { font-size: 1rem; transition: transform 0.4s ease; }
      .theme-toggle:hover .icon { transform: rotate(20deg); }

      /* ── Hero ── */
      .hero { margin-bottom: 3rem; }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--accent-dim);
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 50px;
        margin-bottom: 1rem;
      }

      .hero h1 {
        font-family: 'Syne', sans-serif;
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 800;
        line-height: 1.1;
        letter-spacing: -0.02em;
        color: var(--text);
        margin-bottom: 0.75rem;
      }

      .hero h1 span { color: var(--accent); }

      .hero p {
        color: var(--muted);
        font-size: 1rem;
        font-weight: 300;
        max-width: 440px;
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin-bottom: 2.5rem;
      }

      /* ── Grid ── */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 1.25rem;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem 1.5rem 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition), background var(--transition);
        text-decoration: none;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform var(--transition);
      }

      .card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: var(--shadow);
      }
      .card:hover::before { transform: scaleX(1); }

      .card-icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: var(--accent-dim);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem;
      }

      .card-title {
        font-family: 'Syne', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
      }

      .card-sub {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 400;
        letter-spacing: 0.03em;
      }

      .card-cta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: auto;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .card-cta .arrow {
        transition: transform var(--transition);
        display: inline-block;
      }
      .card:hover .card-cta .arrow { transform: translateX(5px); }

      /* ── Footer ── */
      footer {
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted);
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      footer a:hover { text-decoration: underline; }

      /* ── Fade-in animation ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .card { animation: fadeUp 0.45s ease both; }
      .card:nth-child(1) { animation-delay: 0.05s; }
      .card:nth-child(2) { animation-delay: 0.12s; }
      .card:nth-child(3) { animation-delay: 0.19s; }
      .card:nth-child(4) { animation-delay: 0.26s; }
      .card:nth-child(5) { animation-delay: 0.33s; }
    </style>
  </head>

  <body>
    <div class="page">
      <header>
        <div class="brand">
          <div class="brand-dot"></div>
          <span class="brand-label">SSC Prep</span>
        </div>
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
          <span class="icon" id="themeIcon">🌙</span>
          <span id="themeLabel">Dark</span>
        </button>
      </header>

      <section class="hero">
        <div class="hero-tag">📚 Practice Hub</div>
        <h1>SSC <span>Mock</span> Test</h1>
        <p>Select a subject below to begin your analysis and sharpen your exam skills.</p>
      </section>

      <div class="divider"></div>

      <div class="grid" id="mainContent">
        <!-- Cards injected by main.js -->
      </div>

      <footer>
        <p>Developed by <a href="https://nandysagar.in/" target="_blank">Sagar Nandy</a></p>
      </footer>
    </div>

    <script src="assets/js/main.js"></script>
  </body>
</html>
